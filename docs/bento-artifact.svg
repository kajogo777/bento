<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 440" font-family="system-ui, -apple-system, sans-serif">

  <!-- OCI artifact outer frame -->
  <rect x="10" y="10" width="560" height="420" rx="14" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="290" y="36" text-anchor="middle" fill="#64748b" font-size="11">OCI artifact  ·  push to Docker Hub, GHCR, ECR, Artifact Registry</text>

  <!-- Inner container: bento workspace -->
  <rect x="30" y="50" width="520" height="368" rx="10" fill="#1a1a2e" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="290" y="78" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="600">bento workspace</text>
  <line x1="50" y1="90" x2="530" y2="90" stroke="#334155" stroke-width="1"/>

  <!-- Layer (bottom): deps -->
  <rect x="50" y="102" width="480" height="64" rx="6" fill="#0f2940" stroke="#2563eb" stroke-width="1.2"/>
  <text x="70" y="124" fill="#60a5fa" font-size="13" font-weight="600">deps</text>
  <text x="70" y="142" fill="#94a3b8" font-size="11">node_modules, .venv, vendor, build cache</text>
  <text x="510" y="142" text-anchor="end" fill="#475569" font-size="10" font-style="italic">rarely changes</text>

  <!-- Layer (middle): agent -->
  <rect x="50" y="174" width="480" height="64" rx="6" fill="#1a0f2e" stroke="#8b5cf6" stroke-width="1.2"/>
  <text x="70" y="196" fill="#a78bfa" font-size="13" font-weight="600">agent</text>
  <text x="70" y="214" fill="#94a3b8" font-size="11">memory, plans, session history, skills</text>
  <text x="510" y="214" text-anchor="end" fill="#475569" font-size="10" font-style="italic">changes often</text>

  <!-- Layer (top): project -->
  <rect x="50" y="246" width="480" height="64" rx="6" fill="#0f2922" stroke="#10b981" stroke-width="1.2"/>
  <text x="70" y="268" fill="#34d399" font-size="13" font-weight="600">project</text>
  <text x="70" y="286" fill="#94a3b8" font-size="11">source code, tests, configs, build files</text>
  <text x="510" y="286" text-anchor="end" fill="#475569" font-size="10" font-style="italic">changes often</text>

  <!-- Metadata -->
  <rect x="50" y="322" width="480" height="82" rx="6" fill="#1e1b2e" stroke="#64748b" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="70" y="346" fill="#94a3b8" font-size="12" font-weight="600">metadata</text>
  <text x="70" y="366" fill="#64748b" font-size="10.5">env vars, secret references, git repos (branch, sha, remote)</text>
  <text x="70" y="384" fill="#64748b" font-size="10.5">active extensions, task description, platform (os/arch)</text>

</svg>
