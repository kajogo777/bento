<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect x="20" y="10" width="680" height="320" rx="12" fill="#1a1a2e" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Title -->
  <text x="360" y="42" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="600">🍱 bento workspace</text>
  <line x1="40" y1="54" x2="680" y2="54" stroke="#334155" stroke-width="1"/>

  <!-- Layer: deps -->
  <rect x="40" y="68" width="200" height="140" rx="8" fill="#0f2940" stroke="#2563eb" stroke-width="1.2"/>
  <text x="140" y="92" text-anchor="middle" fill="#60a5fa" font-size="14" font-weight="600">deps</text>
  <text x="140" y="114" text-anchor="middle" fill="#94a3b8" font-size="11">node_modules</text>
  <text x="140" y="130" text-anchor="middle" fill="#94a3b8" font-size="11">.venv, vendor</text>
  <text x="140" y="146" text-anchor="middle" fill="#94a3b8" font-size="11">build cache</text>
  <text x="140" y="176" text-anchor="middle" fill="#475569" font-size="10" font-style="italic">rarely changes</text>

  <!-- Layer: agent -->
  <rect x="260" y="68" width="200" height="140" rx="8" fill="#1a0f2e" stroke="#8b5cf6" stroke-width="1.2"/>
  <text x="360" y="92" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="600">agent</text>
  <text x="360" y="114" text-anchor="middle" fill="#94a3b8" font-size="11">memory, plans</text>
  <text x="360" y="130" text-anchor="middle" fill="#94a3b8" font-size="11">session history</text>
  <text x="360" y="146" text-anchor="middle" fill="#94a3b8" font-size="11">skills, commands</text>
  <text x="360" y="176" text-anchor="middle" fill="#475569" font-size="10" font-style="italic">changes often</text>

  <!-- Layer: project -->
  <rect x="480" y="68" width="200" height="140" rx="8" fill="#0f2922" stroke="#10b981" stroke-width="1.2"/>
  <text x="580" y="92" text-anchor="middle" fill="#34d399" font-size="14" font-weight="600">project</text>
  <text x="580" y="114" text-anchor="middle" fill="#94a3b8" font-size="11">source code, tests</text>
  <text x="580" y="130" text-anchor="middle" fill="#94a3b8" font-size="11">configs, build files</text>
  <text x="580" y="146" text-anchor="middle" fill="#94a3b8" font-size="11">everything else</text>
  <text x="580" y="176" text-anchor="middle" fill="#475569" font-size="10" font-style="italic">changes often</text>

  <!-- Metadata bar -->
  <rect x="40" y="224" width="640" height="90" rx="8" fill="#1e1b2e" stroke="#64748b" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="360" y="250" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="600">metadata</text>
  <text x="360" y="274" text-anchor="middle" fill="#64748b" font-size="11">env vars · secret references · git repos</text>
  <text x="360" y="292" text-anchor="middle" fill="#64748b" font-size="11">extensions · task · platform</text>
</svg>
