# Full bento.yaml showing all config fields.
# Extensions auto-detect agents and frameworks — no need to list them.
task: "refactor auth module"

store: ~/.bento/store
remote: ghcr.io/myorg/workspaces

env:
  NODE_ENV: development
  DATABASE_URL:
    source: env
    var: DATABASE_URL
  API_KEY:
    source: file
    path: /run/secrets/api-key

ignore:
  - "*.log"
  - "tmp/"

hooks:
  pre_save: "make clean"
  post_restore: "npm install"
  pre_push: "npm test"
  timeout: 300

retention:
  keep_last: 10
  keep_tagged: true

watch:
  debounce: 10
  message: "auto-save"
  skip_secret_scan: false

# Secret scrubbing requires no configuration. Secrets detected by gitleaks
# are automatically scrubbed from checkpoints during save and restored on
# open. A one-time encryption key is shown after each save for sharing.
# See specs/secret-scrubbing.md for details.
