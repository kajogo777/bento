# bento.yaml with watch mode and custom layer watch methods.
# Per-layer watch controls how each layer triggers auto-checkpoints:
#   realtime  — instant detection via filesystem events (default for project)
#   periodic  — checked every ~30s via polling (default for deps and agent)
#   off       — not watched, but still included in manual saves
task: "full-stack development"

layers:
  - name: deps
    patterns: ["node_modules/**", ".venv/**"]
    watch: periodic

  - name: agent
    patterns: [".claude/**", "CLAUDE.md", "AGENTS.md"]
    watch: periodic

  - name: build-cache
    patterns: ["dist/**", ".next/**"]
    watch: off               # build output shouldn't trigger saves

  - name: project
    catch_all: true
    watch: realtime

watch:
  debounce: 5
  skip_secret_scan: true

retention:
  keep_tagged: true
  tiers:
    - max_age: 1h            # keep all checkpoints from the last hour
    - max_age: 24h
      resolution: 1h         # 1h–24h: keep one per hour
    - max_age: 168h
      resolution: 24h        # 1d–7d: keep one per day
