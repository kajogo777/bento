# Example: Working with secrets in bento.
#
# No configuration needed. Bento automatically detects secrets via gitleaks,
# scrubs them from checkpoints, and restores them on open.
#
# Save (secrets detected and scrubbed automatically):
#
#   $ bento save -m "my work"
#   Scrubbed 2 secret(s):
#     .mcp.json        openai-api-key
#     config.yaml      aws-access-token
#   Tagged: cp-1, latest
#
#   Hint: To share secrets with the checkpoint:
#      Via registry:  bento push --include-secrets
#      Via file:      bento secrets export cp-1 > bundle.enc
#
# Open (same machine -- seamless, no key needed):
#
#   $ bento open cp-1 ./restore
#     .mcp.json        openai-api-key    OK
#   Hydrated 1 secret(s)
#
# Sharing option 1 -- via registry (encrypted secrets in artifact):
#
#   $ bento push --include-secrets
#   Included encrypted secrets.
#   Recipient: bento open <ref> <dir> --secret-key __BENTO_SCRUBBED[4e51080b8906]__
#
# Sharing option 2 -- via file (no secrets in registry):
#
#   $ bento secrets export cp-1 > bundle.enc
#   Secret key: __BENTO_SCRUBBED[4e51080b8906]__
#   Recipient: bento open <ref> <dir> --secret-key __BENTO_SCRUBBED[4e51080b8906]__ --secrets-file bundle.enc
#
# The key is shown at push/export time, not at save time.
# All secrets are encrypted -- they cannot be read without the key.

