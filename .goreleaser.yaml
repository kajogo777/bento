version: 2
builds:
  - main: ./cmd/bento
    binary: bento
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "bento_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

brews:
  - repository:
      owner: kajogo777
      name: bento
    directory: Formula
    homepage: https://github.com/kajogo777/bento
    description: "Portable agent workspaces. Pack, ship, resume."

dockers:
  - image_templates:
      - "ghcr.io/kajogo777/bento:{{ .Version }}"
      - "ghcr.io/kajogo777/bento:latest"
    dockerfile: Dockerfile.goreleaser
    goarch: amd64
    goos: linux

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
