version: 2
builds:
  - main: ./cmd/bento
    binary: bento
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats:
      - tar.gz
    name_template: "bento_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

homebrew_casks:
  - name: bento
    repository:
      owner: kajogo777
      name: bento
    directory: Casks
    homepage: https://github.com/kajogo777/bento
    description: "Portable agent workspaces. Save, ship, restore."

