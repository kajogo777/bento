version: 2
builds:
  - main: ./cmd/bento
    binary: bento
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats:
      - tar.gz
    name_template: "bento_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

brews:
  - repository:
      owner: kajogo777
      name: bento
    directory: Formula
    homepage: https://github.com/kajogo777/bento
    description: "Portable agent workspaces. Save, ship, restore."
    license: MIT
    install: |
      bin.install "bento"

dockers_v2:
  - images:
      - "ghcr.io/kajogo777/bento"
    tags:
      - "{{ .Version }}"
      - "latest"
    dockerfile: Dockerfile.goreleaser
    platforms:
      - linux/amd64
    sbom: false

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
